version: '3.8'

services:
  # Backend Service
  driver-backend:
    build: .
    container_name: driver-backend
    working_dir: /app/backend
    command: sh -c "npm install && npm start"
    volumes:
      - .:/app
      - /app/backend/node_modules
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Use the shared DB from the passenger stack (mongo on host:27018)
      - MONGO_URI=mongodb://host.docker.internal:27018/vanbooking?directConnection=true
      - MONGODB_URI=mongodb://host.docker.internal:27018/vanbooking?directConnection=true
      - TZ=Asia/Bangkok

  # Frontend Service
  driver-frontend:
    build: .
    container_name: driver-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - .:/app
      - /app/frontend/node_modules
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - driver-backend
